<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>文章分类 · 芯片工坊</title>
<!-- Fonts: system-native Chinese & monospace — zero external deps -->
<style>
:root {
  --silicon: #080c14;
  --plasma: #00d4ff;
  --plasma-dim: #0070a0;
  --plasma-glow: rgba(0,212,255,0.18);
  --resist: #ff4470;
  --resist-dim: #881040;
  --copper: #e8a850;
  --text: #c8d8e8;
  --text-bright: #e8f0f8;
  --text-dim: #607080;
  --card-bg: rgba(13,21,32,0.88);
  --card-border: rgba(30,50,70,0.6);
  --input-bg: rgba(8,12,24,0.9);
  --tag-bg: rgba(15,28,40,0.8);
  --tag-text: #7088a0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "STHeiti", -apple-system, sans-serif;
  background: var(--silicon);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

/* ═══════════════════════════════════════════
   WAFER BACKGROUND LAYER
   ═══════════════════════════════════════════ */
.bg-layer {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  pointer-events: none;
}

/* ── Wafer positioning wrappers — keep translate(-50%,-50%) separate from rotation animation ── */
.wafer-anchor {
  position: absolute;
  width: 0; height: 0;
  top: 48%; left: 50%;
}
.wafer-anchor-2 {
  position: absolute;
  width: 0; height: 0;
  top: 52%; left: 47%;
}

/* ── Primary wafer disc ── */
.wafer {
  position: absolute;
  width: 130vmax; height: 130vmax;
  top: 0; left: 0;
  transform: translate(-50%, -50%) rotate(8deg);
  border-radius: 50%;
  background:
    /* Bright spot — plasma center glow */
    radial-gradient(circle at 25% 32%, rgba(0,210,255,0.28) 0%, rgba(0,160,240,0.06) 30%, transparent 48%),
    /* Purple resist sheen */
    radial-gradient(circle at 72% 48%, rgba(160,60,210,0.22) 0%, rgba(120,30,180,0.05) 35%, transparent 50%),
    /* Copper interconnect warmth */
    radial-gradient(circle at 55% 68%, rgba(230,170,60,0.20) 0%, rgba(200,140,40,0.04) 40%, transparent 52%),
    /* Teal edge glow */
    radial-gradient(circle at 40% 52%, rgba(0,220,180,0.12) 0%, transparent 45%),
    /* Iridescent conic — crystal orientation sectors */
    conic-gradient(
      from 12deg,
      rgba(8,16,30,1)     0deg,   rgba(18,42,80,0.92)  10deg,
      rgba(8,16,30,1)     22deg,  rgba(14,52,56,0.88)  42deg,
      rgba(8,16,30,1)     56deg,  rgba(42,18,52,0.84)  82deg,
      rgba(8,16,30,1)     100deg, rgba(14,48,72,0.88)  128deg,
      rgba(8,16,30,1)     148deg, rgba(18,52,44,0.85)  172deg,
      rgba(8,16,30,1)     192deg, rgba(26,28,66,0.88)  218deg,
      rgba(8,16,30,1)     238deg, rgba(16,44,60,0.84)  262deg,
      rgba(8,16,30,1)     282deg, rgba(32,20,50,0.85)  312deg,
      rgba(8,16,30,1)     360deg
    );
  animation: waferSpin 50s linear infinite;
  mask-image: radial-gradient(circle, rgba(0,0,0,0.52) 22%, rgba(0,0,0,0.22) 52%, rgba(0,0,0,0.05) 74%, transparent 90%);
  -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,0.52) 22%, rgba(0,0,0,0.22) 52%, rgba(0,0,0,0.05) 74%, transparent 90%);
}

/* ── Secondary wafer — offset, counter-rotating ── */
.wafer-2 {
  position: absolute;
  width: 155vmax; height: 155vmax;
  top: 0; left: 0;
  transform: translate(-50%, -50%) rotate(82deg);
  border-radius: 50%;
  opacity: 0.55;
  animation: waferSpin 80s linear infinite reverse;
  background:
    radial-gradient(circle at 58% 38%, rgba(0,170,250,0.14) 0%, transparent 42%),
    radial-gradient(circle at 28% 62%, rgba(210,100,60,0.11) 0%, transparent 38%),
    conic-gradient(
      from 45deg,
      transparent 0deg, rgba(28,62,94,0.38) 18deg,
      transparent 42deg, rgba(64,28,68,0.34) 70deg,
      transparent 94deg, rgba(18,72,62,0.34) 128deg,
      transparent 158deg, rgba(28,52,82,0.38) 188deg,
      transparent 214deg, rgba(74,38,52,0.34) 248deg,
      transparent 276deg, rgba(18,62,72,0.36) 318deg,
      transparent 360deg
    );
  mask-image: radial-gradient(circle, rgba(0,0,0,0.32) 18%, rgba(0,0,0,0.12) 48%, transparent 72%);
  -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,0.32) 18%, rgba(0,0,0,0.12) 48%, transparent 72%);
}

/* ── Edge ring — wafer bevel ── */
.wafer-ring {
  position: absolute;
  width: 95vmin; height: 95vmin;
  top: 10%; left: 50%;
  transform: translate(-50%, 0);
  border-radius: 50%;
  border: 3px solid rgba(0,180,240,0.30);
  box-shadow:
    inset 0 0 100px rgba(0,190,230,0.06),
    0 0 80px rgba(0,190,230,0.06),
    0 0 4px rgba(0,200,250,0.20);
  animation: ringPulse 6s ease-in-out infinite;
}

/* ── Inner ring — exclusion zone ── */
.wafer-ring-inner {
  position: absolute;
  width: 75vmin; height: 75vmin;
  top: 17.5%; left: 50%;
  transform: translate(-50%, 0);
  border-radius: 50%;
  border: 1px solid rgba(0,170,220,0.16);
  box-shadow: inset 0 0 60px rgba(0,180,220,0.03);
}

/* ═══════════════════════════════════════════
   DIE GRID — prominent stepping pattern
   ═══════════════════════════════════════════ */
.die-grid {
  position: absolute; inset: 0;
  /* Primary grid lines */
  background-image:
    linear-gradient(rgba(0,190,240,0.13) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,190,240,0.13) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(circle 50vmin at 50% 18%, black 35%, rgba(0,0,0,0.5) 55%, transparent 72%);
  -webkit-mask-image: radial-gradient(circle 50vmin at 50% 18%, black 35%, rgba(0,0,0,0.5) 55%, transparent 72%);
}

/* Die scribe lines — horizontal streets (wider) */
.die-grid-streets {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(0,200,250,0.10) 2px, transparent 2px),
    linear-gradient(90deg, rgba(0,200,250,0.10) 2px, transparent 2px);
  background-size: 224px 224px;
  mask-image: radial-gradient(circle 48vmin at 50% 18%, black 30%, transparent 68%);
  -webkit-mask-image: radial-gradient(circle 48vmin at 50% 18%, black 30%, transparent 68%);
}

/* ── Individual die highlight — a few brighter chips ── */
.die-highlight {
  position: absolute;
  background: rgba(0,200,245,0.08);
  border: 1px solid rgba(0,200,245,0.10);
  animation: dieBlink 4s ease-in-out infinite;
}
.dh-1 { left: 18%; top: 14%; width: 120px; height: 100px; animation-delay: 0s; }
.dh-2 { left: 42%; top: 22%; width: 90px; height: 110px; animation-delay: 1.2s; }
.dh-3 { left: 64%; top: 10%; width: 110px; height: 95px; animation-delay: 2.5s; }
.dh-4 { left: 28%; top: 32%; width: 95px; height: 105px; animation-delay: 0.8s; }
.dh-5 { left: 52%; top: 36%; width: 100px; height: 85px; animation-delay: 3.2s; }
.dh-6 { left: 72%; top: 28%; width: 115px; height: 90px; animation-delay: 1.8s; }
@keyframes dieBlink {
  0%, 100% { opacity: 0.5; }
  50%      { opacity: 1.2; }
}

/* ═══════════════════════════════════════════
   RETICLE ALIGNMENT MARKS — brighter
   ═══════════════════════════════════════════ */
.reticle {
  position: absolute;
  width: 36px; height: 36px;
  border: 2px solid rgba(0,210,250,0.30);
  border-radius: 2px;
  animation: reticleGlow 3s ease-in-out infinite;
}
.reticle::before, .reticle::after {
  content: '';
  position: absolute;
  background: rgba(0,210,250,0.28);
}
.reticle::before { top: 50%; left: -10px; right: -10px; height: 2px; }
.reticle::after  { left: 50%; top: -10px; bottom: -10px; width: 2px; }

.reticle-tl { top: 4%; left: 4%; animation-delay: 0s; }
.reticle-tr { top: 4%; right: 4%; animation-delay: 0.6s; }
.reticle-bl { bottom: 8%; left: 5%; animation-delay: 1.2s; }
.reticle-br { bottom: 8%; right: 5%; animation-delay: 1.8s; }

/* Sub-reticles — smaller inner marks */
.reticle-sub {
  position: absolute;
  width: 18px; height: 18px;
  border: 1px solid rgba(0,180,220,0.20);
  border-radius: 1px;
  animation: reticleGlow 4s ease-in-out infinite;
}
.reticle-sub::before, .reticle-sub::after {
  content: '';
  position: absolute;
  background: rgba(0,180,220,0.18);
}
.reticle-sub::before { top: 50%; left: -5px; right: -5px; height: 1px; }
.reticle-sub::after  { left: 50%; top: -5px; bottom: -5px; width: 1px; }

.rsub-1 { top: 26%; left: 14%; animation-delay: 0.3s; }
.rsub-2 { top: 26%; right: 14%; animation-delay: 0.9s; }
.rsub-3 { bottom: 22%; left: 16%; animation-delay: 1.5s; }
.rsub-4 { bottom: 22%; right: 16%; animation-delay: 2.1s; }

@keyframes reticleGlow {
  0%, 100% { border-color: rgba(0,210,250,0.30); }
  50%      { border-color: rgba(0,230,255,0.55); box-shadow: 0 0 20px rgba(0,210,250,0.12); }
}

/* ── Wafer notch / orientation flat ── */
.wafer-notch {
  position: absolute;
  width: 70px; height: 5px;
  bottom: 16%; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,190,230,0.22);
  border-radius: 3px;
  box-shadow: 0 0 24px rgba(0,190,230,0.12);
}

/* ═══════════════════════════════════════════
   PLASMA PARTICLES — more & brighter
   ═══════════════════════════════════════════ */
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--plasma);
  filter: blur(1px);
  animation: floatUp linear infinite;
  opacity: 0;
}
.particle:nth-child(1)  { width:2.5px; height:2.5px; left:10%; animation-duration:7s;  animation-delay:0s; }
.particle:nth-child(2)  { width:1.5px; height:1.5px; left:20%; animation-duration:5.5s; animation-delay:1.5s; }
.particle:nth-child(3)  { width:2px;   height:2px;   left:32%; animation-duration:8s;  animation-delay:0.8s; }
.particle:nth-child(4)  { width:1px;   height:1px;   left:45%; animation-duration:6s;  animation-delay:2.5s; }
.particle:nth-child(5)  { width:2.2px; height:2.2px; left:58%; animation-duration:7.5s; animation-delay:1.2s; }
.particle:nth-child(6)  { width:1.5px; height:1.5px; left:68%; animation-duration:5.8s; animation-delay:3s; }
.particle:nth-child(7)  { width:1.8px; height:1.8px; left:78%; animation-duration:9s;  animation-delay:0.4s; }
.particle:nth-child(8)  { width:1.2px; height:1.2px; left:88%; animation-duration:6.5s; animation-delay:2s; }
.particle:nth-child(9)  { width:2px;   height:2px;   left:25%; animation-duration:11s; animation-delay:1s; }
.particle:nth-child(10) { width:1.4px; height:1.4px; left:52%; animation-duration:8.5s; animation-delay:3.5s; }
.particle:nth-child(11) { width:1.8px; height:1.8px; left:38%; animation-duration:6.8s; animation-delay:0.6s; }
.particle:nth-child(12) { width:2.3px; height:2.3px; left:72%; animation-duration:9.5s; animation-delay:2.8s; }

@keyframes floatUp {
  0%   { transform: translateY(105vh) scale(0); opacity:0; }
  8%   { opacity:0.7; }
  75%  { opacity:0.25; }
  100% { transform: translateY(-8vh) scale(1.6); opacity:0; }
}

/* ── Scanline effect — ion beam raster ── */
.scanline {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,180,220,0.02) 2px,
    rgba(0,180,220,0.02) 4px
  );
  pointer-events: none;
  mask-image: radial-gradient(circle 45vmin at 50% 18%, black 30%, transparent 65%);
  -webkit-mask-image: radial-gradient(circle 45vmin at 50% 18%, black 30%, transparent 65%);
}

@keyframes waferSpin {
  0%   { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes ringPulse {
  0%, 100% { border-color: rgba(0,180,240,0.30); box-shadow: inset 0 0 100px rgba(0,190,230,0.06), 0 0 80px rgba(0,190,230,0.06); }
  50%      { border-color: rgba(0,220,255,0.45); box-shadow: inset 0 0 140px rgba(0,200,250,0.10), 0 0 100px rgba(0,200,250,0.09); }
}

/* ═══════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════ */
.main-content {
  position: relative; z-index: 1;
  max-width: 640px; margin: 0 auto;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 10;
  padding: 28px 20px 12px;
  background: linear-gradient(180deg, rgba(8,12,20,0.98) 70%, rgba(8,12,20,0.82) 90%, transparent);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border-bottom: 1px solid rgba(30,50,70,0.45);
}

.header-top {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 6px;
}

.wafer-icon {
  width: 38px; height: 38px; flex-shrink: 0;
  animation: iconSpin 18s linear infinite;
  filter: drop-shadow(0 0 8px rgba(0,200,245,0.4));
}
@keyframes iconSpin {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.header h1 {
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", "Microsoft YaHei", monospace;
  font-size: 26px; font-weight: 400; letter-spacing: 6px;
  background: linear-gradient(135deg, var(--plasma) 0%, #80e8ff 40%, var(--copper) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 14px rgba(0,200,240,0.35));
}

.header .subtitle {
  text-align: center;
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 3px; margin-bottom: 18px;
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", monospace;
  text-transform: uppercase;
}
.header .subtitle span { color: var(--plasma-dim); }

/* ── Search ── */
.search-box {
  display: flex; gap: 8px; margin-bottom: 12px;
  position: relative;
}
.search-box::before {
  content: '>';
  position: absolute;
  left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--plasma-dim);
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", monospace;
  font-size: 14px; z-index: 2; pointer-events: none;
}

.search-input {
  flex: 1; height: 44px;
  padding: 0 14px 0 30px;
  border-radius: 6px;
  border: 1px solid rgba(30,50,70,0.6);
  background: var(--input-bg);
  color: var(--text-bright);
  font-size: 14px;
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", "Microsoft YaHei", monospace;
  outline: none;
  transition: all 0.25s;
  letter-spacing: 0.5px;
}
.search-input::placeholder { color: rgba(96,112,128,0.5); font-family: "PingFang SC", "Microsoft YaHei", "STHeiti", sans-serif; }
.search-input:focus {
  border-color: var(--plasma);
  box-shadow: 0 0 0 3px var(--plasma-glow), inset 0 0 20px rgba(0,212,255,0.04);
}

.search-clear {
  width: 44px; height: 44px; border-radius: 6px;
  border: 1px solid rgba(30,50,70,0.6);
  background: var(--input-bg);
  color: var(--text-dim); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", monospace;
}
.search-clear:hover { border-color: var(--resist); color: var(--resist); box-shadow: 0 0 14px rgba(255,68,112,0.18); }

/* ── Tags ── */
.tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0 2px; }

.tag {
  padding: 7px 16px; border-radius: 4px;
  font-size: 11px; letter-spacing: 1px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border: 1px solid rgba(30,50,70,0.3);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none; -webkit-user-select: none;
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", "Microsoft YaHei", monospace;
  position: relative; overflow: hidden;
}
.tag::after {
  content: '';
  position: absolute; top: 3px; right: 3px;
  width: 5px; height: 5px; border-radius: 1px;
  background: rgba(255,255,255,0.08);
  transition: all 0.2s;
}
.tag:hover {
  border-color: rgba(0,210,250,0.45);
  background: rgba(8,32,52,0.85);
  color: #90cce8;
}
.tag:hover::after { background: var(--plasma); box-shadow: 0 0 8px var(--plasma); }

.tag.active {
  background: rgba(0,190,230,0.14);
  color: var(--plasma);
  border-color: rgba(0,210,250,0.55);
  text-shadow: 0 0 10px rgba(0,210,250,0.35);
}
.tag.active::after { background: var(--plasma); box-shadow: 0 0 10px var(--plasma); }

.tag-all { font-weight: 700; letter-spacing: 2px; font-family: "Cascadia Code", "Consolas", "Source Code Pro", monospace; }

/* ── Stats ── */
.stats {
  display: flex; justify-content: space-between;
  padding: 10px 2px 0;
  font-size: 11px; color: var(--text-dim);
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", monospace;
  letter-spacing: 1px;
}
.stats #statsFilter { color: var(--plasma-dim); }
.stats #statsFilter::before { content: '◆ '; font-size: 8px; }

/* ═══════════════════════════════════════════
   ARTICLE CARDS — die-shaped
   ═══════════════════════════════════════════ */
.list { padding: 0 20px 50px; }

.card {
  display: block; text-decoration: none; color: inherit;
  background: var(--card-bg);
  border-radius: 8px; padding: 18px;
  margin-bottom: 12px;
  border: 1px solid var(--card-border);
  transition: all 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
  position: relative; overflow: hidden;
  clip-path: polygon(
    0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%,
    12px 100%, 0 calc(100% - 12px)
  );
}

/* Scribe corner etch */
.card::before {
  content: '';
  position: absolute;
  top: -1px; right: -1px;
  width: 36px; height: 36px;
  border-left: 1px solid rgba(0,210,250,0.10);
  border-bottom: 1px solid rgba(0,210,250,0.10);
  transform: rotate(45deg) translate(8px, -18px);
  pointer-events: none;
  transition: all 0.3s;
}

/* Left-edge plasma accent */
.card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--plasma-dim), var(--resist-dim), transparent 80%);
  opacity: 0;
  transition: opacity 0.35s;
}

.card:hover, .card:active {
  border-color: rgba(0,210,250,0.55);
  background: rgba(16,28,44,0.92);
  transform: translateY(-2px);
  box-shadow:
    0 12px 36px rgba(0,0,0,0.45),
    0 0 0 1px rgba(0,210,250,0.10),
    0 0 50px rgba(0,190,230,0.07);
}
.card:hover::before { border-color: rgba(0,210,250,0.25); }
.card:hover::after { opacity: 1; }

.card-title {
  font-size: 15px; font-weight: 600; color: var(--text-bright);
  margin-bottom: 8px; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  letter-spacing: 0.3px;
}

.card-summary {
  font-size: 13px; color: var(--text-dim); line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  font-size: 10px; color: var(--text-dim);
}

.card-date {
  color: var(--plasma-dim);
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", monospace;
  letter-spacing: 0.5px;
}

.card-tag {
  padding: 3px 10px; border-radius: 3px;
  font-size: 10px;
  background: rgba(15,28,40,0.8);
  color: var(--tag-text);
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", "Microsoft YaHei", monospace;
  letter-spacing: 0.5px;
  border: 1px solid rgba(30,50,70,0.3);
  transition: all 0.2s;
}
.card:hover .card-tag { border-color: rgba(0,190,230,0.25); }

/* ═══════════════════════════════════════════
   EMPTY STATE
   ═══════════════════════════════════════════ */
.empty {
  text-align: center; padding: 80px 20px; color: var(--text-dim);
}
.empty-icon {
  font-size: 56px; margin-bottom: 16px;
  display: inline-block;
  animation: waferSpin 30s linear infinite;
}
.empty-text {
  font-size: 14px; line-height: 1.8;
  font-family: "Cascadia Code", "Consolas", "Source Code Pro", monospace;

   FOOTER
   ═══════════════════════════════════════════ */

  border-top: 1px solid rgba(30,50,70,0.3);

  .die-grid { background-size: 40px 40px; }

}

</style>
</head>

<script src="articles.js"></script>
<script>
(function() {
  var allTags = new Set();
  var DATE_RE = /^\d{4}-\d{2}-\d{2}$/;

  ARTICLE_DATA.forEach(function(a) {
    (a.tags || '').split(',').forEach(function(t) {
      var tag = t.trim();
      if (tag) allTags.add(tag);
    });
    if (!a.date || !DATE_RE.test(a.date)) a.date = '2026-01-01';
  });

  var allTagArr = Array.from(allTags).sort();
  var tagsWrap = document.getElementById('tagsWrap');
  var listEl = document.getElementById('articleList');
  var searchInput = document.getElementById('searchInput');
  var searchClear = document.getElementById('searchClear');
  var statsText = document.getElementById('statsText');
  var statsFilter = document.getElementById('statsFilter');
  var activeTag = null;
  var searchQuery = '';

  var urlParams = new URLSearchParams(window.location.search);
  var urlTag = urlParams.get('tag');
  if (urlTag && allTagArr.indexOf(urlTag) !== -1) activeTag = urlTag;

  function renderTags() {
    var html = '<span class="tag tag-all active" data-tag="">全部</span>';
    allTagArr.forEach(function(tag) {
      html += '<span class="tag' + (activeTag === tag ? ' active' : '') + '" data-tag="' + escHtml(tag) + '">' + escHtml(tag) + '</span>';
    });
    tagsWrap.innerHTML = html;
    tagsWrap.querySelectorAll('.tag').forEach(function(el) {
      el.addEventListener('click', function() {
        activeTag = this.dataset.tag || null;
        searchQuery = ''; searchInput.value = '';
        renderTags(); renderList();
      });
    });
  }

  searchInput.addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    if (searchQuery) { activeTag = null; renderTags(); }
    renderList();
  });
  searchClear.addEventListener('click', function() { searchInput.value = ''; searchQuery = ''; renderList(); });

  function filterArticles() {
    var list = ARTICLE_DATA;
    if (activeTag) list = list.filter(function(a) { return (a.tags || '').split(',').map(function(t){return t.trim();}).indexOf(activeTag) !== -1; });
    if (searchQuery) list = list.filter(function(a) { return a.title.toLowerCase().indexOf(searchQuery) !== -1 || (a.summary || '').toLowerCase().indexOf(searchQuery) !== -1 || (a.tags || '').toLowerCase().indexOf(searchQuery) !== -1; });
    return list.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
  }

  function renderList() {
    var filtered = filterArticles();
    var total = ARTICLE_DATA.length;
    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">&#9678;</div><div class="empty-text">No matching recipes found<br><span style="font-size:11px;color:rgba(96,112,128,0.5)">没有找到匹配的技术文章 — 试试换关键词或分类</span></div></div>';
    } else {
      var html = '';
      filtered.forEach(function(a) {
        var tags = (a.tags || '').split(',').map(function(t) { return t.trim(); }).filter(Boolean);
        html += '<a class="card" href="' + escAttr(a.url) + '" target="_blank" rel="noopener"><div class="card-title">' + escHtml(a.title) + '</div><div class="card-summary">' + escHtml(a.summary || '') + '</div><div class="card-meta"><span class="card-date">' + formatDate(a.date) + '</span>' + tags.map(function(t) { return '<span class="card-tag">' + escHtml(t) + '</span>'; }).join('') + '</div></a>';
      });
      listEl.innerHTML = html;
    }
    statsText.textContent = '共 ' + total + ' 篇文章';
    if ((activeTag || searchQuery) && filtered.length !== total) { statsFilter.style.display = ''; statsFilter.textContent = '筛选到 ' + filtered.length + ' 篇'; }
    else { statsFilter.style.display = 'none'; }
  }

  function escHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function escAttr(s)  { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function formatDate(d) { if (!d) return ''; var p = d.split('-'); return Number(p[1]) + '月' + Number(p[2]) + '日'; }

  renderTags();
  renderList();
})();
</script>
