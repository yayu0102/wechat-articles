<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>文章分类 · 无限回旋</title>
<style>
:root {
  --bg: #0a0a14;
  --card: #14101e;
  --border: #2a2040;
  --gold: #C8A050;
  --gold-dim: #8a6a30;
  --text: #e0d8c8;
  --text-dim: #887a6a;
  --tag-bg: #1a1424;
  --tag-text: #b0a088;
  --active-bg: #2a1a20;
  --active-text: #FFD700;
  --input-bg: #181020;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}
/* 顶部 */
.header {
  position: sticky; top:0; z-index: 10;
  background: linear-gradient(180deg, var(--bg) 80%, transparent);
  padding: 20px 16px 12px;
}
.header h1 {
  font-size: 22px; color: var(--gold); text-align: center;
  letter-spacing: 2px; margin-bottom: 16px;
}
.header h1 span { font-size: 14px; color: var(--gold-dim); display: block; letter-spacing: 0; margin-top: 2px; }

/* 搜索 */
.search-box {
  display: flex; gap: 8px; margin: 0 0 12px;
}
.search-input {
  flex:1; height:40px; padding:0 14px; border-radius: 20px;
  border:1px solid var(--border); background: var(--input-bg);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--gold); }
.search-clear {
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--input-bg); color: var(--text-dim); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.search-clear:hover { border-color: var(--gold); color: var(--gold); }

/* 分类标签 */
.tags-wrap {
  display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0;
}
.tag {
  padding: 6px 16px; border-radius: 16px; font-size: 13px;
  background: var(--tag-bg); color: var(--tag-text);
  border: 1px solid transparent; cursor: pointer;
  transition: all .15s; white-space: nowrap;
  user-select: none; -webkit-user-select: none;
}
.tag:hover { border-color: var(--border); }
.tag.active { background: var(--active-bg); color: var(--active-text); border-color: var(--gold-dim); }
.tag-all { font-weight: bold; }

/* 统计 */
.stats {
  display: flex; justify-content: space-between; padding: 8px 2px 0;
  font-size: 12px; color: var(--text-dim);
}

/* 文章列表 */
.list { padding: 0 16px 40px; }
.card {
  display: block; text-decoration: none; color: inherit;
  background: var(--card); border-radius: 12px; padding: 16px;
  margin-bottom: 10px; border: 1px solid transparent;
  transition: all .2s; position: relative;
}
.card:hover, .card:active { border-color: var(--border); background: #1a1428; }
.card-title {
  font-size: 16px; font-weight: 600; color: var(--text);
  margin-bottom: 6px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-summary {
  font-size: 13px; color: var(--text-dim); line-height: 1.5;
  margin-bottom: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-dim);
}
.card-date { color: var(--gold-dim); }
.card-tag {
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; background: var(--tag-bg); color: var(--tag-text);
}
.card-arrow {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 18px; opacity: 0;
  transition: opacity .2s;
}
.card:hover .card-arrow { opacity: 1; }

/* 空状态 */
.empty {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* 页脚 */
.footer {
  text-align: center; padding: 20px; font-size: 11px; color: var(--text-dim);
}
</style>
</head>
<body>

<div class="header">
  <h1>无限回旋<span>命运之书 · 创作笔记</span></h1>
  <div class="search-box">
    <input class="search-input" type="text" id="searchInput" placeholder="搜文章标题或内容...">
    <button class="search-clear" id="searchClear" title="清除">✕</button>
  </div>
  <div class="tags-wrap" id="tagsWrap"></div>
  <div class="stats">
    <span id="statsText">共 10 篇文章</span>
    <span id="statsFilter" style="display:none"></span>
  </div>
</div>

<div class="list" id="articleList"></div>

<div class="footer">无限回旋 · 命运之书</div>

<script src="articles.js"></script>
<script>
(function() {
  // ===== 初始化 =====
  const allTags = new Set();
  const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;

  ARTICLE_DATA.forEach(a => {
    (a.tags || '').split(',').forEach(t => {
      const tag = t.trim();
      if (tag) allTags.add(tag);
    });
    // 确保 date 字段是有效的
    if (!a.date || !DATE_RE.test(a.date)) {
      a.date = '2026-01-01';
    }
  });

  const allTagArr = Array.from(allTags).sort();
  const tagsWrap = document.getElementById('tagsWrap');
  const listEl = document.getElementById('articleList');
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const statsText = document.getElementById('statsText');
  const statsFilter = document.getElementById('statsFilter');

  let activeTag = null;   // null = all
  let searchQuery = '';

  // ===== 渲染分类标签 =====
  function renderTags() {
    let html = '<span class="tag tag-all active" data-tag="">全部</span>';
    allTagArr.forEach(tag => {
      const cls = activeTag === tag ? ' active' : '';
      html += `<span class="tag${cls}" data-tag="${escHtml(tag)}">${escHtml(tag)}</span>`;
    });
    tagsWrap.innerHTML = html;

    // 绑定点击
    tagsWrap.querySelectorAll('.tag').forEach(el => {
      el.addEventListener('click', function() {
        activeTag = this.dataset.tag || null;
        searchQuery = '';
        searchInput.value = '';
        renderTags();
        renderList();
      });
    });
  }

  // ===== 搜索 =====
  searchInput.addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    if (searchQuery) {
      activeTag = null;
      renderTags();
    }
    renderList();
  });
  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchQuery = '';
    renderList();
  });

  // ===== 过滤逻辑 =====
  function filterArticles() {
    let list = ARTICLE_DATA;
    if (activeTag) {
      list = list.filter(a => {
        const tags = (a.tags || '').split(',').map(t => t.trim());
        return tags.includes(activeTag);
      });
    }
    if (searchQuery) {
      list = list.filter(a => {
        return a.title.toLowerCase().includes(searchQuery) ||
               (a.summary || '').toLowerCase().includes(searchQuery) ||
               (a.tags || '').toLowerCase().includes(searchQuery);
      });
    }
    // 按日期倒序
    list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    return list;
  }

  // ===== 渲染列表 =====
  function renderList() {
    const filtered = filterArticles();
    const total = ARTICLE_DATA.length;

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">没有找到匹配的文章<br>试试换个关键词或分类</div></div>';
    } else {
      let html = '';
      filtered.forEach(a => {
        const tags = (a.tags || '').split(',').map(t => t.trim()).filter(Boolean);
        const dateStr = formatDate(a.date);
        html += `
          <a class="card" href="${escAttr(a.url)}">
            <div class="card-title">${escHtml(a.title)}</div>
            <div class="card-summary">${escHtml(a.summary || '')}</div>
            <div class="card-meta">
              <span class="card-date">📅 ${dateStr}</span>
              ${tags.map(t => `<span class="card-tag">${escHtml(t)}</span>`).join('')}
            </div>
            <div class="card-arrow">›</div>
          </a>`;
      });
      listEl.innerHTML = html;
    }

    statsText.textContent = `共 ${total} 篇`;
    if ((activeTag || searchQuery) && filtered.length !== total) {
      statsFilter.style.display = '';
      statsFilter.textContent = `筛选到 ${filtered.length} 篇`;
    } else {
      statsFilter.style.display = 'none';
    }
  }

  // ===== 工具函数 =====
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function formatDate(d) {
    if (!d) return '';
    const parts = d.split('-');
    return `${parseInt(parts[1])}月${parseInt(parts[2])}日`;
  }

  // ===== 启动 =====
  renderTags();
  renderList();
})();
</script>
</body>
</html>
