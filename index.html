<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>文章分类 · 芯片工坊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --silicon: #080c14;
  --wafer-blue: #0a1a3a;
  --wafer-teal: #0a2a2a;
  --wafer-purple: #1a0a2a;
  --plasma: #00d4ff;
  --plasma-dim: #006888;
  --plasma-glow: rgba(0,212,255,0.15);
  --resist: #ff4470;
  --resist-dim: #881040;
  --copper: #e8a850;
  --text: #c8d8e8;
  --text-bright: #e8f0f8;
  --text-dim: #607080;
  --card-bg: rgba(13,21,32,0.85);
  --card-border: rgba(30,50,70,0.6);
  --input-bg: rgba(8,12,24,0.9);
  --tag-bg: rgba(15,28,40,0.8);
  --tag-text: #7088a0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: "Noto Sans SC", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--silicon);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

/* ── Wafer Background Layer ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
  pointer-events: none;
}

/* Giant iridescent wafer */
.wafer {
  position: absolute;
  width: 140vmax; height: 140vmax;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle at 35% 40%, rgba(0,180,220,0.12) 0%, transparent 40%),
    radial-gradient(circle at 65% 55%, rgba(180,60,140,0.08) 0%, transparent 35%),
    radial-gradient(circle at 50% 60%, rgba(200,160,60,0.05) 0%, transparent 45%),
    conic-gradient(
      from 0deg,
      rgba(8,14,24,1) 0deg, rgba(10,22,50,0.6) 15deg,
      rgba(8,14,24,1) 30deg, rgba(10,40,40,0.6) 55deg,
      rgba(8,14,24,1) 70deg, rgba(20,10,40,0.5) 100deg,
      rgba(8,14,24,1) 120deg, rgba(8,30,50,0.6) 145deg,
      rgba(8,14,24,1) 165deg, rgba(10,35,30,0.5) 190deg,
      rgba(8,14,24,1) 210deg, rgba(12,18,42,0.6) 235deg,
      rgba(8,14,24,1) 255deg, rgba(10,28,44,0.5) 280deg,
      rgba(8,14,24,1) 300deg, rgba(16,12,36,0.5) 330deg,
      rgba(8,14,24,1) 360deg
    );
  animation: waferShimmer 60s linear infinite;
  mask-image: radial-gradient(circle, rgba(0,0,0,0.3) 30%, rgba(0,0,0,0.08) 60%, transparent 80%);
  -webkit-mask-image: radial-gradient(circle, rgba(0,0,0,0.3) 30%, rgba(0,0,0,0.08) 60%, transparent 80%);
}

/* Wafer edge ring with notch */
.wafer-ring {
  position: absolute;
  width: 100vmin; height: 100vmin;
  top: 12%; left: 50%;
  transform: translate(-50%, 0);
  border-radius: 50%;
  border: 2px solid rgba(30,60,90,0.25);
  box-shadow:
    inset 0 0 80px rgba(0,180,220,0.04),
    0 0 60px rgba(0,180,220,0.03);
  animation: ringPulse 8s ease-in-out infinite;
}

/* Die grid — stepping pattern */
.die-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(40,80,120,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(40,80,120,0.06) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(circle 45vmin at 50% 22%, black 40%, transparent 70%);
  -webkit-mask-image: radial-gradient(circle 45vmin at 50% 22%, black 40%, transparent 70%);
}

/* Reticle alignment crosshairs */
.reticle {
  position: absolute;
  width: 28px; height: 28px;
  border: 1px solid rgba(0,200,240,0.18);
  border-radius: 2px;
}
.reticle::before, .reticle::after {
  content: '';
  position: absolute;
  background: rgba(0,200,240,0.15);
}
.reticle::before { top: 50%; left: -8px; right: -8px; height: 1px; }
.reticle::after  { left: 50%; top: -8px; bottom: -8px; width: 1px; }

.reticle-tl { top: 6%; left: 6%; }
.reticle-tr { top: 6%; right: 6%; }
.reticle-bl { bottom: 10%; left: 8%; }
.reticle-br { bottom: 10%; right: 8%; }

/* Wafer orientation flat */
.wafer-notch {
  position: absolute;
  width: 60px; height: 4px;
  bottom: 18%; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,180,220,0.12);
  border-radius: 2px;
  box-shadow: 0 0 20px rgba(0,180,220,0.08);
}

/* Plasma ion particles */
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--plasma);
  filter: blur(1px);
  animation: floatUp linear infinite;
  opacity: 0;
}
.particle:nth-child(1) { width:2px; height:2px; left:15%; animation-duration:8s; animation-delay:0s; }
.particle:nth-child(2) { width:1px; height:1px; left:25%; animation-duration:6s; animation-delay:2s; }
.particle:nth-child(3) { width:2px; height:2px; left:40%; animation-duration:9s; animation-delay:1s; }
.particle:nth-child(4) { width:1px; height:1px; left:55%; animation-duration:7s; animation-delay:3s; }
.particle:nth-child(5) { width:2px; height:2px; left:70%; animation-duration:8.5s; animation-delay:1.5s; }
.particle:nth-child(6) { width:1px; height:1px; left:80%; animation-duration:6.5s; animation-delay:4s; }
.particle:nth-child(7) { width:1.5px; height:1.5px; left:32%; animation-duration:10s; animation-delay:2.5s; }
.particle:nth-child(8) { width:1px; height:1px; left:62%; animation-duration:7.5s; animation-delay:0.5s; }

@keyframes floatUp {
  0%   { transform: translateY(100vh) scale(0); opacity:0; }
  10%  { opacity:0.6; }
  80%  { opacity:0.3; }
  100% { transform: translateY(-10vh) scale(1.5); opacity:0; }
}

@keyframes waferShimmer {
  0%   { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes ringPulse {
  0%, 100% { box-shadow: inset 0 0 80px rgba(0,180,220,0.04), 0 0 60px rgba(0,180,220,0.03); }
  50%      { box-shadow: inset 0 0 100px rgba(0,200,240,0.07), 0 0 80px rgba(0,200,240,0.05); }
}

/* ── Main Content ── */
.main-content {
  position: relative; z-index: 1;
  max-width: 640px; margin: 0 auto;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 10;
  padding: 28px 20px 12px;
  background: linear-gradient(180deg, rgba(8,12,20,0.97) 70%, rgba(8,12,20,0.85) 90%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(30,50,70,0.4);
}

.header-top {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 6px;
}

/* Animated wafer icon SVG */
.wafer-icon {
  width: 36px; height: 36px; flex-shrink: 0;
  animation: iconSpin 20s linear infinite;
}
@keyframes iconSpin {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.header h1 {
  font-family: "Share Tech Mono", "Noto Sans SC", monospace;
  font-size: 26px; font-weight: 400; letter-spacing: 6px;
  background: linear-gradient(135deg, var(--plasma) 0%, #80e8ff 40%, var(--copper) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(0,200,240,0.3));
}

.header .subtitle {
  text-align: center;
  font-size: 12px; color: var(--text-dim);
  letter-spacing: 3px; margin-bottom: 18px;
  font-family: "Share Tech Mono", monospace;
  text-transform: uppercase;
}
.header .subtitle span { color: var(--plasma-dim); }

/* ── Search ── */
.search-box {
  display: flex; gap: 8px; margin-bottom: 12px;
  position: relative;
}

/* Terminal prompt decoration */
.search-box::before {
  content: '>';
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--plasma-dim);
  font-family: "Share Tech Mono", monospace;
  font-size: 14px; z-index: 2; pointer-events: none;
}

.search-input {
  flex: 1; height: 44px;
  padding: 0 14px 0 30px;
  border-radius: 6px;
  border: 1px solid rgba(30,50,70,0.6);
  background: var(--input-bg);
  color: var(--text-bright);
  font-size: 14px;
  font-family: "Share Tech Mono", "Noto Sans SC", monospace;
  outline: none;
  transition: all 0.25s;
  letter-spacing: 0.5px;
}
.search-input::placeholder {
  color: rgba(96,112,128,0.5);
  font-family: "Noto Sans SC", sans-serif;
}
.search-input:focus {
  border-color: var(--plasma);
  box-shadow:
    0 0 0 3px var(--plasma-glow),
    inset 0 0 20px rgba(0,212,255,0.03);
}

.search-clear {
  width: 44px; height: 44px; border-radius: 6px;
  border: 1px solid rgba(30,50,70,0.6);
  background: var(--input-bg);
  color: var(--text-dim); font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: "Share Tech Mono", monospace;
}
.search-clear:hover {
  border-color: var(--resist);
  color: var(--resist);
  box-shadow: 0 0 12px rgba(255,68,112,0.15);
}

/* ── Tags ── */
.tags-wrap {
  display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0 2px;
}

.tag {
  padding: 7px 16px; border-radius: 4px;
  font-size: 11px; letter-spacing: 1px;
  background: var(--tag-bg);
  color: var(--tag-text);
  border: 1px solid rgba(30,50,70,0.3);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  user-select: none; -webkit-user-select: none;
  font-family: "Share Tech Mono", "Noto Sans SC", monospace;
  position: relative; overflow: hidden;
}

.tag::after {
  content: '';
  position: absolute;
  top: 3px; right: 3px;
  width: 4px; height: 4px;
  border-radius: 1px;
  background: rgba(255,255,255,0.06);
  transition: all 0.2s;
}

.tag:hover {
  border-color: rgba(0,200,240,0.4);
  background: rgba(8,30,50,0.8);
  color: #90c8e0;
}
.tag:hover::after {
  background: var(--plasma);
  box-shadow: 0 0 6px var(--plasma);
}

.tag.active {
  background: rgba(0,180,220,0.12);
  color: var(--plasma);
  border-color: rgba(0,200,240,0.5);
  text-shadow: 0 0 8px rgba(0,200,240,0.3);
}
.tag.active::after {
  background: var(--plasma);
  box-shadow: 0 0 8px var(--plasma);
}

.tag-all {
  font-weight: 700; letter-spacing: 2px;
  font-family: "Share Tech Mono", monospace;
}

/* ── Stats ── */
.stats {
  display: flex; justify-content: space-between;
  padding: 10px 2px 0;
  font-size: 11px; color: var(--text-dim);
  font-family: "Share Tech Mono", monospace;
  letter-spacing: 1px;
}
.stats #statsFilter { color: var(--plasma-dim); }
.stats #statsFilter::before { content: '◆ '; font-size: 8px; }

/* ── Article Cards ── */
.list { padding: 0 20px 50px; }

.card {
  display: block; text-decoration: none; color: inherit;
  background: var(--card-bg);
  border-radius: 8px; padding: 18px;
  margin-bottom: 12px;
  border: 1px solid var(--card-border);
  transition: all 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
  position: relative; overflow: hidden;
  /* Die-like chamfered corners */
  clip-path: polygon(
    0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%,
    12px 100%, 0 calc(100% - 12px)
  );
}

/* Scribe line corner mark */
.card::before {
  content: '';
  position: absolute;
  top: -1px; right: -1px;
  width: 32px; height: 32px;
  border-left: 1px solid rgba(0,200,240,0.08);
  border-bottom: 1px solid rgba(0,200,240,0.08);
  transform: rotate(45deg) translate(8px, -16px);
  pointer-events: none;
  transition: all 0.3s;
}

/* Left-edge plasma glow on hover */
.card::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--plasma-dim), var(--resist-dim), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover, .card:active {
  border-color: rgba(0,200,240,0.5);
  background: rgba(16,26,42,0.9);
  transform: translateY(-2px);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    0 0 0 1px rgba(0,200,240,0.08),
    0 0 40px rgba(0,180,220,0.05);
}
.card:hover::before { border-color: rgba(0,200,240,0.2); }
.card:hover::after { opacity: 1; }

.card-title {
  font-size: 15px; font-weight: 600; color: var(--text-bright);
  margin-bottom: 8px; line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
  letter-spacing: 0.3px;
}

.card-summary {
  font-size: 13px; color: var(--text-dim); line-height: 1.6;
  margin-bottom: 12px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  font-size: 10px; color: var(--text-dim);
}

.card-date {
  color: var(--plasma-dim);
  font-family: "Share Tech Mono", monospace;
  letter-spacing: 0.5px;
}

.card-tag {
  padding: 3px 10px; border-radius: 3px;
  font-size: 10px;
  background: rgba(15,28,40,0.8);
  color: var(--tag-text);
  font-family: "Share Tech Mono", "Noto Sans SC", monospace;
  letter-spacing: 0.5px;
  border: 1px solid rgba(30,50,70,0.3);
  transition: all 0.2s;
}
.card:hover .card-tag { border-color: rgba(0,180,220,0.2); }

/* Plasma spark SVG on card hover */
.card-spark {
  position: absolute;
  right: 24px; top: 50%;
  transform: translateY(-50%);
  width: 24px; height: 24px;
  opacity: 0;
  transition: all 0.3s;
}
.card:hover .card-spark { opacity: 0.5; }

/* ── Empty State ── */
.empty {
  text-align: center; padding: 80px 20px; color: var(--text-dim);
}
.empty-icon {
  font-size: 56px; margin-bottom: 16px;
  display: inline-block;
  animation: waferShimmer 30s linear infinite;
}
.empty-text {
  font-size: 14px; line-height: 1.8;
  font-family: "Share Tech Mono", monospace;
  letter-spacing: 1px;
}

/* ── Footer ── */
.footer {
  text-align: center; padding: 28px 20px;
  font-size: 11px; color: var(--text-dim);
  border-top: 1px solid rgba(30,50,70,0.3);
  margin-top: 20px;
  font-family: "Share Tech Mono", monospace;
  letter-spacing: 1px;
  position: relative; z-index: 1;
}
.footer span { color: var(--plasma-dim); }

/* Mini wafer in footer */
.footer-wafer {
  display: inline-block;
  width: 40px; height: 40px;
  border-radius: 50%;
  margin-bottom: 12px;
  background:
    radial-gradient(circle at 40% 35%, rgba(0,180,220,0.2), transparent 60%),
    radial-gradient(circle at 60% 60%, rgba(200,160,60,0.1), transparent 50%);
  border: 1px solid rgba(30,60,80,0.3);
  box-shadow: 0 0 20px rgba(0,180,220,0.06);
  animation: ringPulse 8s ease-in-out infinite;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .header { padding: 20px 14px 10px; }
  .header h1 { font-size: 22px; letter-spacing: 4px; }
  .list { padding: 0 14px 40px; }
  .card { padding: 14px; border-radius: 6px; }
  .card { clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); }
  .tag { padding: 5px 10px; font-size: 10px; }
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(30,50,70,0.5); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,180,220,0.4); }

/* ── Selection ── */
::selection {
  background: rgba(0,200,240,0.25);
  color: var(--text-bright);
}
</style>
</head>
<body>

<!-- Background Layer -->
<div class="bg-layer">
  <div class="wafer"></div>
  <div class="wafer-ring"></div>
  <div class="die-grid"></div>
  <div class="reticle reticle-tl"></div>
  <div class="reticle reticle-tr"></div>
  <div class="reticle reticle-bl"></div>
  <div class="reticle reticle-br"></div>
  <div class="wafer-notch"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
</div>

<!-- Main Content -->
<div class="main-content">
  <div class="header">
    <div class="header-top">
      <!-- Animated wafer SVG icon -->
      <svg class="wafer-icon" viewBox="0 0 48 48">
        <defs>
          <linearGradient id="wGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
            <stop offset="40%" stop-color="#8860d0" stop-opacity="0.4"/>
            <stop offset="70%" stop-color="#e8a850" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.5"/>
          </linearGradient>
        </defs>
        <circle cx="24" cy="24" r="22" fill="none" stroke="url(#wGrad)" stroke-width="1.2"/>
        <circle cx="24" cy="24" r="17" fill="none" stroke="url(#wGrad)" stroke-width="0.5" opacity="0.5"/>
        <circle cx="24" cy="24" r="8" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="0.4" opacity="0.4"/>
        <line x1="24" y1="2" x2="24" y2="46" stroke="rgba(0,200,240,0.12)" stroke-width="0.3"/>
        <line x1="2" y1="24" x2="46" y2="24" stroke="rgba(0,200,240,0.12)" stroke-width="0.3"/>
        <line x1="7" y1="7" x2="41" y2="41" stroke="rgba(30,60,90,0.15)" stroke-width="0.2"/>
        <line x1="41" y1="7" x2="7" y2="41" stroke="rgba(30,60,90,0.15)" stroke-width="0.2"/>
        <rect x="20" y="2" width="8" height="3" rx="1" fill="rgba(0,200,240,0.25)"/>
        <circle cx="24" cy="24" r="1.5" fill="rgba(0,212,255,0.4)"/>
      </svg>
      <h1>芯片工坊</h1>
    </div>
    <div class="subtitle">Chip Workshop <span>·</span> 半导体技术笔记</div>
    <div class="search-box">
      <input class="search-input" type="text" id="searchInput" placeholder="搜索工艺、设备、材料...">
      <button class="search-clear" id="searchClear" title="清除">×</button>
    </div>
    <div class="tags-wrap" id="tagsWrap"></div>
    <div class="stats">
      <span id="statsText">共 0 篇文章</span>
      <span id="statsFilter" style="display:none"></span>
    </div>
  </div>

  <div class="list" id="articleList"></div>

  <div class="footer">
    <div class="footer-wafer"></div>
    <div><span>Chip Workshop</span> · 记录半导体制造的每一个技术细节</div>
  </div>
</div>

<script src="articles.js"></script>
<script>
(function() {
  var allTags = new Set();
  var DATE_RE = /^\d{4}-\d{2}-\d{2}$/;

  ARTICLE_DATA.forEach(function(a) {
    (a.tags || '').split(',').forEach(function(t) {
      var tag = t.trim();
      if (tag) allTags.add(tag);
    });
    if (!a.date || !DATE_RE.test(a.date)) {
      a.date = '2026-01-01';
    }
  });

  var allTagArr = Array.from(allTags).sort();
  var tagsWrap = document.getElementById('tagsWrap');
  var listEl = document.getElementById('articleList');
  var searchInput = document.getElementById('searchInput');
  var searchClear = document.getElementById('searchClear');
  var statsText = document.getElementById('statsText');
  var statsFilter = document.getElementById('statsFilter');

  var activeTag = null;
  var searchQuery = '';

  var urlParams = new URLSearchParams(window.location.search);
  var urlTag = urlParams.get('tag');
  if (urlTag && allTagArr.indexOf(urlTag) !== -1) {
    activeTag = urlTag;
  }

  function renderTags() {
    var html = '<span class="tag tag-all active" data-tag="">全部</span>';
    allTagArr.forEach(function(tag) {
      var cls = activeTag === tag ? ' active' : '';
      html += '<span class="tag' + cls + '" data-tag="' + escHtml(tag) + '">' + escHtml(tag) + '</span>';
    });
    tagsWrap.innerHTML = html;

    tagsWrap.querySelectorAll('.tag').forEach(function(el) {
      el.addEventListener('click', function() {
        activeTag = this.dataset.tag || null;
        searchQuery = '';
        searchInput.value = '';
        renderTags();
        renderList();
      });
    });
  }

  searchInput.addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    if (searchQuery) { activeTag = null; renderTags(); }
    renderList();
  });
  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchQuery = '';
    renderList();
  });

  function filterArticles() {
    var list = ARTICLE_DATA;
    if (activeTag) {
      list = list.filter(function(a) {
        var tags = (a.tags || '').split(',').map(function(t) { return t.trim(); });
        return tags.indexOf(activeTag) !== -1;
      });
    }
    if (searchQuery) {
      list = list.filter(function(a) {
        return a.title.toLowerCase().indexOf(searchQuery) !== -1 ||
               (a.summary || '').toLowerCase().indexOf(searchQuery) !== -1 ||
               (a.tags || '').toLowerCase().indexOf(searchQuery) !== -1;
      });
    }
    list.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
    return list;
  }

  function renderList() {
    var filtered = filterArticles();
    var total = ARTICLE_DATA.length;

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">&#9678;</div><div class="empty-text">No matching recipes found<br><span style="font-size:11px;color:rgba(96,112,128,0.5)">没有找到匹配的技术文章 — 试试换关键词或分类</span></div></div>';
    } else {
      var html = '';
      filtered.forEach(function(a) {
        var tags = (a.tags || '').split(',').map(function(t) { return t.trim(); }).filter(Boolean);
        var dateStr = formatDate(a.date);
        html +=
          '<a class="card" href="' + escAttr(a.url) + '" target="_blank" rel="noopener">' +
            '<div class="card-title">' + escHtml(a.title) + '</div>' +
            '<div class="card-summary">' + escHtml(a.summary || '') + '</div>' +
            '<div class="card-meta">' +
              '<span class="card-date">' + dateStr + '</span>' +
              tags.map(function(t) { return '<span class="card-tag">' + escHtml(t) + '</span>'; }).join('') +
            '</div>' +
            '<svg class="card-spark" viewBox="0 0 24 24" width="24" height="24">' +
              '<line x1="12" y1="2" x2="12" y2="7" stroke="rgba(0,212,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>' +
              '<line x1="12" y1="17" x2="12" y2="22" stroke="rgba(0,212,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>' +
              '<line x1="4" y1="9" x2="8" y2="11" stroke="rgba(0,212,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>' +
              '<line x1="16" y1="13" x2="20" y2="15" stroke="rgba(0,212,255,0.4)" stroke-width="0.8" stroke-linecap="round"/>' +
              '<circle cx="12" cy="12" r="2" fill="none" stroke="rgba(0,212,255,0.35)" stroke-width="0.8"/>' +
            '</svg>' +
          '</a>';
      });
      listEl.innerHTML = html;
    }

    statsText.textContent = '共 ' + total + ' 篇文章';
    if ((activeTag || searchQuery) && filtered.length !== total) {
      statsFilter.style.display = '';
      statsFilter.textContent = '筛选到 ' + filtered.length + ' 篇';
    } else {
      statsFilter.style.display = 'none';
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function formatDate(d) {
    if (!d) return '';
    var parts = d.split('-');
    return Number(parts[1]) + '月' + Number(parts[2]) + '日';
  }

  renderTags();
  renderList();
})();
</script>
</body>
</html>
