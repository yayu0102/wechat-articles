<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>文章分类 · 芯片工坊</title>
<style>
:root {
  --bg: #0a0e14;
  --card: #111720;
  --border: #1e2a3a;
  --accent: #00A8CC;
  --accent-dim: #006680;
  --accent-glow: rgba(0,168,204,0.12);
  --text: #d0d8e0;
  --text-dim: #6e7a8a;
  --tag-bg: #141e2a;
  --tag-text: #8a9aaa;
  --active-bg: #0a1a28;
  --active-text: #00C8F0;
  --input-bg: #101720;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* 顶部 */
.header {
  position: sticky; top:0; z-index:10;
  background: linear-gradient(180deg, var(--bg) 80%, transparent);
  backdrop-filter: blur(12px);
  padding: 24px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 24px; color: var(--accent); text-align: center;
  letter-spacing: 4px; font-weight: 700; margin-bottom: 4px;
}
.header h1::before { content: "⚙️ "; font-size: 20px; }
.header h1::after { content: " ⚙️"; font-size: 20px; }
.header .subtitle {
  text-align: center; font-size: 13px; color: var(--text-dim);
  letter-spacing: 2px; margin-bottom: 16px;
}

/* 搜索 */
.search-box {
  display: flex; gap: 8px; margin: 0 0 12px;
}
.search-input {
  flex:1; height:40px; padding:0 14px; border-radius: 8px;
  border:1px solid var(--border); background: var(--input-bg);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-clear {
  width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--input-bg); color: var(--text-dim); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.search-clear:hover { border-color: var(--accent); color: var(--accent); }

/* 分类标签 */
.tags-wrap {
  display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0;
}
.tag {
  padding: 6px 14px; border-radius: 6px; font-size: 12px;
  background: var(--tag-bg); color: var(--tag-text);
  border: 1px solid transparent; cursor: pointer;
  transition: all .15s; white-space: nowrap;
  user-select: none; -webkit-user-select: none;
  font-family: "SF Mono","Consolas","Microsoft YaHei",monospace;
}
.tag:hover { border-color: var(--border); }
.tag.active { background: var(--active-bg); color: var(--active-text); border-color: var(--accent-dim); }
.tag-all { font-weight: 700; font-family: inherit; }

/* 统计 */
.stats {
  display: flex; justify-content: space-between; padding: 8px 2px 0;
  font-size: 12px; color: var(--text-dim);
}

/* 文章列表 */
.list { padding: 0 16px 40px; }
.card {
  display: block; text-decoration: none; color: inherit;
  background: var(--card); border-radius: 10px; padding: 16px;
  margin-bottom: 10px; border: 1px solid transparent;
  transition: all .2s; position: relative;
  border-left: 3px solid transparent;
}
.card:hover, .card:active { border-color: var(--border); border-left-color: var(--accent); background: #161e2a; }
.card-title {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-bottom: 6px; line-height: 1.4;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-summary {
  font-size: 13px; color: var(--text-dim); line-height: 1.5;
  margin-bottom: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  font-size: 11px; color: var(--text-dim);
}
.card-date { color: var(--accent-dim); font-family: "SF Mono","Consolas",monospace; }
.card-tag {
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; background: var(--tag-bg); color: var(--tag-text);
  font-family: "SF Mono","Consolas","Microsoft YaHei",monospace;
}
.card-arrow {
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 18px; opacity: 0;
  transition: opacity .2s;
}
.card:hover .card-arrow { opacity: 1; }

/* 空状态 */
.empty {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* 页脚 */
.footer {
  text-align: center; padding: 24px; font-size: 11px; color: var(--text-dim);
  border-top: 1px solid var(--border); margin-top: 20px;
}
.footer span { color: var(--accent-dim); }
</style>
</head>
<body>

<div class="header">
  <h1>芯片工坊</h1>
  <div class="subtitle">Chip Workshop · 半导体技术笔记</div>
  <div class="search-box">
    <input class="search-input" type="text" id="searchInput" placeholder="搜索工艺、设备、材料...">
    <button class="search-clear" id="searchClear" title="清除">✕</button>
  </div>
  <div class="tags-wrap" id="tagsWrap"></div>
  <div class="stats">
    <span id="statsText">共 0 篇文章</span>
    <span id="statsFilter" style="display:none"></span>
  </div>
</div>

<div class="list" id="articleList"></div>

<div class="footer">
  <span>Chip Workshop</span> · 记录半导体制造的每一个技术细节
</div>

<script>
var ARTICLE_DATA = [{"title":"光刻之魂：曝光、显影和套刻精度——为什么说光刻是半导体最贵的「画画」？","url":"https://mp.weixin.qq.com/s/zIDWeQzqejEjIZM_3uCwjg","date":"2026-07-02","tags":"光刻,工艺整合,先进工艺","summary":"瑞利判据到化学放大光刻胶，再到2.1nm套刻精度——拆解光刻为什么占制造成本30%以上"},{"title":"半导体制造到底有多少道工序？一张全景图讲透","url":"https://mp.weixin.qq.com/s/SOzYBLM22ioSSk3u09YEMw","date":"2026-07-01","tags":"工艺整合,新手,趋势","summary":"从硅片进来到芯片出去——扩散、光刻、刻蚀、薄膜、CMP、注入、测试，一张全景地图帮你建立整体认知"},{"title":"离子注入机里的磁场和空间电荷到底是什么关系？","url":"https://mp.weixin.qq.com/s/936azvG2jnRMT9LWyPX39Q","date":"2026-06-30","tags":"离子注入,器件物理,设备","summary":"分析磁镜效应、空间电荷中和、束流膨胀——理解注入机束线设计最核心的两组物理概念"},{"title":"离子注入机的心脏：离子源都有哪几种？","url":"https://mp.weixin.qq.com/s/ePrkwyxVipGjonR2djqnTQ","date":"2026-06-30","tags":"离子注入,设备,干货","summary":"Freeman源、Bernas源、RF源、ECR源——从热灯丝到等离子体，拆解离子源的演进与选型"},{"title":"射频加速：离子注入机的心脏怎么跳（一）","url":"https://mp.weixin.qq.com/s/eQQ9_Ll9wpEMn_Yg_mGuXw","date":"2026-06-29","tags":"离子注入,设备,射频","summary":"RF Linac的核心原理——交变电场如何把离子从几十keV加速到MeV量级，逐级拆解"},{"title":"射频加速：离子注入机的心脏怎么跳（二）","url":"https://mp.weixin.qq.com/s/rWFHCl3LYd3D9zuE3J3-Hg","date":"2026-06-29","tags":"离子注入,设备,射频","summary":"腔体谐振、Q值、相位聚焦——RF加速腔设计中最容易踩的坑和最优设计选择"},{"title":"射频加速：射频电源与匹配网络（三）","url":"https://mp.weixin.qq.com/s/Grsn8w87Lvc_Rg4g0yUh1w","date":"2026-06-28","tags":"离子注入,设备,射频","summary":"阻抗匹配网络设计、反射功率控制、自动匹配器的工程实践——RF电源稳定性决定束流质量"},{"title":"Copley CME 驱动器配置软件实操指南","url":"https://mp.weixin.qq.com/s/RtBfreyEoOXOztn48DIDLQ","date":"2026-06-28","tags":"自动化,设备,干货","summary":"从硬件接线到参数配置再到PID调参——Copley CME 驱动器上手的完整步骤和常见坑点"},{"title":"霍尔信号与电机找相","url":"https://mp.weixin.qq.com/s/ET8R3q3_e6g5t9X1Xjku4g","date":"2026-06-27","tags":"自动化,设备,器件物理","summary":"Hall传感器输出解读、UVW六步换向、自动找相算法——直线电机驱动器调试的核心技能"},{"title":"静电吸盘 E-Chuck：晶圆是怎么被吸住的","url":"https://mp.weixin.qq.com/s/Y2R-Gh9MaVWLetZbBeTNRg","date":"2026-06-27","tags":"设备,工艺整合,先进工艺","summary":"J-R型 vs Coulomb型静电吸盘的物理机制、漏电流控制、dechuck优化——晶圆夹持的工程内核"},{"title":"注入工艺实战：能量、剂量、退火、沟道效应与验证四板斧","url":"https://mp.weixin.qq.com/s/xTDKMNe8wP4gdveb59eOUw","date":"2026-06-26","tags":"离子注入,热处理,干货","summary":"能量选择、剂量校准、RTP退火窗口、沟道效应规避——从工艺工程师的角度拆解注入调试全流程"},{"title":"直线电机的骨架与眼睛：光栅尺和霍尔驱动器如何精准配合？","url":"https://mp.weixin.qq.com/s/dLYxGpv_JRsLK-Sj9tJzuw","date":"2026-06-25","tags":"自动化,设备,量测","summary":"光栅尺反馈与Hall换向的协同控制——直线电机定位精度的完整拆解"}];
</script>
<script>
(function() {
  var allTags = new Set();
  var DATE_RE = /^\d{4}-\d{2}-\d{2}$/;

  ARTICLE_DATA.forEach(function(a) {
    (a.tags || '').split(',').forEach(function(t) {
      var tag = t.trim();
      if (tag) allTags.add(tag);
    });
    if (!a.date || !DATE_RE.test(a.date)) {
      a.date = '2026-01-01';
    }
  });

  var allTagArr = Array.from(allTags).sort();
  var tagsWrap = document.getElementById('tagsWrap');
  var listEl = document.getElementById('articleList');
  var searchInput = document.getElementById('searchInput');
  var searchClear = document.getElementById('searchClear');
  var statsText = document.getElementById('statsText');
  var statsFilter = document.getElementById('statsFilter');

  var activeTag = null;
  var searchQuery = '';

  // URL 参数支持: ?tag=光刻 → 自动筛选
  var urlParams = new URLSearchParams(window.location.search);
  var urlTag = urlParams.get('tag');
  if (urlTag && allTagArr.indexOf(urlTag) !== -1) {
    activeTag = urlTag;
  }

  function renderTags() {
    var html = '<span class="tag tag-all active" data-tag="">全部</span>';
    allTagArr.forEach(function(tag) {
      var cls = activeTag === tag ? ' active' : '';
      html += '<span class="tag' + cls + '" data-tag="' + escHtml(tag) + '">' + escHtml(tag) + '</span>';
    });
    tagsWrap.innerHTML = html;

    tagsWrap.querySelectorAll('.tag').forEach(function(el) {
      el.addEventListener('click', function() {
        activeTag = this.dataset.tag || null;
        searchQuery = '';
        searchInput.value = '';
        renderTags();
        renderList();
      });
    });
  }

  searchInput.addEventListener('input', function() {
    searchQuery = this.value.trim().toLowerCase();
    if (searchQuery) { activeTag = null; renderTags(); }
    renderList();
  });
  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchQuery = '';
    renderList();
  });

  function filterArticles() {
    var list = ARTICLE_DATA;
    if (activeTag) {
      list = list.filter(function(a) {
        var tags = (a.tags || '').split(',').map(function(t) { return t.trim(); });
        return tags.indexOf(activeTag) !== -1;
      });
    }
    if (searchQuery) {
      list = list.filter(function(a) {
        return a.title.toLowerCase().indexOf(searchQuery) !== -1 ||
               (a.summary || '').toLowerCase().indexOf(searchQuery) !== -1 ||
               (a.tags || '').toLowerCase().indexOf(searchQuery) !== -1;
      });
    }
    list.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
    return list;
  }

  function renderList() {
    var filtered = filterArticles();
    var total = ARTICLE_DATA.length;

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">🔬</div><div class="empty-text">没有找到匹配的技术文章<br>试试换关键词或分类</div></div>';
    } else {
      var html = '';
      filtered.forEach(function(a) {
        var tags = (a.tags || '').split(',').map(function(t) { return t.trim(); }).filter(Boolean);
        var dateStr = formatDate(a.date);
        html +=
          '<a class="card" href="' + escAttr(a.url) + '">' +
            '<div class="card-title">' + escHtml(a.title) + '</div>' +
            '<div class="card-summary">' + escHtml(a.summary || '') + '</div>' +
            '<div class="card-meta">' +
              '<span class="card-date">' + dateStr + '</span>' +
              tags.map(function(t) { return '<span class="card-tag">' + escHtml(t) + '</span>'; }).join('') +
            '</div>' +
            '<div class="card-arrow">›</div>' +
          '</a>';
      });
      listEl.innerHTML = html;
    }

    statsText.textContent = String(total) + ' 篇文章';
    if ((activeTag || searchQuery) && filtered.length !== total) {
      statsFilter.style.display = '';
      statsFilter.textContent = '筛选到 ' + filtered.length + ' 篇';
    } else {
      statsFilter.style.display = 'none';
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function formatDate(d) {
    if (!d) return '';
    var parts = d.split('-');
    return Number(parts[1]) + '月' + Number(parts[2]) + '日';
  }

  renderTags();
  renderList();
})();
</script>
</body>
</html>
