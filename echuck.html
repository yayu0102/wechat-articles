<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>静电吸盘 E-Chuck · 3D 动画教学</title>
<style>
:root {
  --cleanroom-blue: #0a1628;
  --plasma: #00d4ff;
  --plasma-dim: #006080;
  --copper: #e8a850;
  --resist: #ff4470;
  --silicon: #3a3a50;
  --text: #c0d0e0;
  --text-bright: #e8f0f8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--cleanroom-blue);
  overflow: hidden;
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  height: 100vh; width: 100vw;
  user-select: none; -webkit-user-select: none;
}

#canvas { position:fixed; inset:0; z-index:1; }

/* HUD overlay */
.hud {
  position: fixed; z-index:10; pointer-events:none;
}
.hud-top {
  top: 20px; left: 24px; right: 24px;
  display: flex; align-items: center; gap: 16px;
}
.hud-title {
  font-family: "Cascadia Code","Consolas",monospace;
  font-size: 20px; letter-spacing: 3px;
  background: linear-gradient(135deg, var(--plasma), #80e8ff, var(--copper));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 8px rgba(0,200,240,0.3));
}
.hud-badge {
  font-size: 10px; letter-spacing: 2px;
  color: var(--plasma-dim); font-family: "Cascadia Code","Consolas",monospace;
  border: 1px solid rgba(0,200,240,0.25); border-radius: 4px;
  padding: 4px 10px;
}

/* Bottom narration */
.narration {
  position: fixed; z-index:10; bottom: 40px; left: 50%;
  transform: translateX(-50%);
  max-width: 600px; width: 90%;
  background: rgba(8,14,28,0.92);
  border: 1px solid rgba(0,180,240,0.2);
  border-radius: 12px; padding: 16px 20px;
  backdrop-filter: blur(12px);
  pointer-events: auto;
}
.narration-step {
  font-size: 11px; color: var(--plasma-dim);
  font-family: "Cascadia Code","Consolas",monospace;
  letter-spacing: 2px; margin-bottom: 4px;
}
.narration-title {
  font-size: 17px; color: var(--text-bright);
  font-weight: 600; margin-bottom: 6px;
}
.narration-desc {
  font-size: 13px; color: var(--text);
  line-height: 1.6;
}

/* Step dots */
.steps {
  position: fixed; z-index:10; right: 20px; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: auto;
}
.step-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(0,180,240,0.2);
  border: 1px solid rgba(0,180,240,0.3);
  cursor: pointer; transition: all 0.3s;
}
.step-dot.active { background: var(--plasma); box-shadow: 0 0 12px rgba(0,212,255,0.5); }
.step-dot:hover { border-color: var(--plasma); }

/* Controls */
.controls {
  position: fixed; z-index:10; bottom: 120px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 10px; pointer-events: auto;
}
.ctrl-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid rgba(0,200,240,0.35);
  background: rgba(8,14,28,0.85);
  color: var(--plasma); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; backdrop-filter: blur(8px);
}
.ctrl-btn:hover { background: rgba(0,200,240,0.15); box-shadow: 0 0 20px rgba(0,200,240,0.2); }
.ctrl-btn.play-btn { width: 54px; height: 54px; font-size: 22px; }

/* Type toggle */
.type-toggle {
  position: fixed; z-index:10; top: 70px; left: 24px;
  display: flex; gap: 0; pointer-events: auto;
  border: 1px solid rgba(0,180,240,0.25); border-radius: 6px; overflow: hidden;
}
.type-btn {
  padding: 7px 16px; font-size: 11px; font-family: "Cascadia Code","Consolas",monospace;
  letter-spacing: 1px; color: var(--text-dim); background: rgba(8,14,28,0.75);
  border: none; cursor: pointer; transition: all 0.2s;
}
.type-btn.active { background: rgba(0,180,240,0.15); color: var(--plasma); }
.type-btn:hover { color: var(--text-bright); }

/* Legend */
.legend {
  position: fixed; z-index:10; bottom: 40px; right: 24px; pointer-events:none;
  font-size: 10px; color: var(--text-dim); font-family: "Cascadia Code","Consolas",monospace;
  letter-spacing: 1px;
}
.legend span { color: var(--plasma-dim); }
.legend span.copper { color: var(--copper); }

@media (max-width: 640px) {
  .hud-title { font-size: 16px; letter-spacing: 1px; }
  .narration { bottom: 20px; padding: 12px 14px; }
  .narration-title { font-size: 15px; }
  .controls { bottom: 100px; }
  .steps { right: 8px; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="hud hud-top">
  <span class="hud-title">E-CHUCK</span>
  <span class="hud-badge" id="typeLabel">J-R 型</span>
</div>

<div class="type-toggle">
  <button class="type-btn active" onclick="setType('jr')">J-R 型</button>
  <button class="type-btn" onclick="setType('coulomb')">Coulomb 型</button>
</div>

<div class="steps" id="stepsContainer"></div>

<div class="controls">
  <button class="ctrl-btn" onclick="prevStep()" title="上一步">◀</button>
  <button class="ctrl-btn play-btn" id="playBtn" onclick="toggleAuto()" title="自动播放">▶</button>
  <button class="ctrl-btn" onclick="nextStep()" title="下一步">▶</button>
</div>

<div class="narration" id="narration">
  <div class="narration-step">STEP 1 / 5</div>
  <div class="narration-title">晶圆接近</div>
  <div class="narration-desc">机械臂将晶圆送至静电吸盘上方，lift pin 升起接住晶圆后缓缓下降。</div>
</div>

<div class="legend">
  <span>█</span> 电极  <span class="copper">█</span> 介质层  <span>◇</span> 晶圆
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── DOM refs ──
const canvas = document.getElementById('canvas');
const narration = document.getElementById('narration');
const playBtn = document.getElementById('playBtn');
const typeLabel = document.getElementById('typeLabel');
const stepsContainer = document.getElementById('stepsContainer');

// ── Scene setup ──
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color('#080e18');
scene.fog = new THREE.Fog('#080e18', 8, 30);

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.5, 40);
camera.position.set(5, 4.5, 7);
camera.lookAt(0, 0.6, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 4;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.65;
controls.update();

// ── Lighting ──
const ambient = new THREE.AmbientLight('#1a3050', 1.8);
scene.add(ambient);

const key = new THREE.DirectionalLight('#e8f0ff', 4);
key.position.set(8, 10, 6);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5;
key.shadow.camera.far = 40;
key.shadow.camera.left = -8;
key.shadow.camera.right = 8;
key.shadow.camera.top = 8;
key.shadow.camera.bottom = -8;
key.shadow.bias = -0.0001;
scene.add(key);

const rim = new THREE.DirectionalLight('#0088cc', 3);
rim.position.set(-4, 3, -2);
scene.add(rim);

const fill = new THREE.DirectionalLight('#224466', 1.5);
fill.position.set(0, -1, 4);
scene.add(fill);

// ── Ground ──
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: '#0c1628', roughness: 0.85, metalness: 0.3 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.5;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const grid = new THREE.GridHelper(12, 24, '#1a3550', '#0d1e30');
grid.position.y = -2.49;
scene.add(grid);

// ── Materials ──
const matChuckBody = new THREE.MeshStandardMaterial({ color: '#2a3040', roughness: 0.35, metalness: 0.8 });
const matElectrode = new THREE.MeshStandardMaterial({ color: '#d4883c', roughness: 0.2, metalness: 0.95, emissive: '#331100', emissiveIntensity: 0.3 });
const matDielectric = new THREE.MeshPhysicalMaterial({
  color: '#8899aa', roughness: 0.15, metalness: 0.05,
  clearcoat: 0.4, clearcoatRoughness: 0.15,
  transparent: true, opacity: 0.7,
  envMapIntensity: 0.5
});
const matDielectricJR = new THREE.MeshStandardMaterial({ color: '#667788', roughness: 0.55, metalness: 0.1 });
const matWafer = new THREE.MeshPhysicalMaterial({
  color: '#3a3060', roughness: 0.05, metalness: 0.6,
  clearcoat: 0.6, clearcoatRoughness: 0.05,
  emissive: '#0a0020', emissiveIntensity: 0.2,
  specularIntensity: 0.8
});
const matLiftPin = new THREE.MeshStandardMaterial({ color: '#889898', roughness: 0.25, metalness: 0.9 });
const matSpark = new THREE.MeshBasicMaterial({ color: '#00e0ff' });
const matFieldLine = new THREE.MeshBasicMaterial({ color: '#00c8f0', transparent: true, opacity: 0.5 });

// ── Build ESC Chuck ──
const chuckGroup = new THREE.Group();
scene.add(chuckGroup);

// Main body
const chuckBody = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.7, 0.55, 64), matChuckBody);
chuckBody.position.y = 0;
chuckBody.castShadow = true; chuckBody.receiveShadow = true;
chuckGroup.add(chuckBody);

// Base plate
const basePlate = new THREE.Mesh(new THREE.CylinderGeometry(1.75, 1.8, 0.12, 64), matChuckBody);
basePlate.position.y = -0.3;
basePlate.castShadow = true;
chuckGroup.add(basePlate);

// Outer electrode ring (bipolar pattern)
const electrodeOuter = new THREE.Mesh(
  new THREE.TorusGeometry(1.15, 0.08, 32, 64),
  matElectrode
);
electrodeOuter.rotation.x = -Math.PI / 2;
electrodeOuter.position.y = 0.28;
chuckGroup.add(electrodeOuter);

// Inner electrode disc
const electrodeInner = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6, 0.6, 0.02, 64),
  matElectrode
);
electrodeInner.position.y = 0.285;
chuckGroup.add(electrodeInner);

// Electrode connecting pads
const pad1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.04, 32), matElectrode);
pad1.position.set(1.05, 0.285, 0);
chuckGroup.add(pad1);
const pad2 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.04, 32), matElectrode);
pad2.position.set(-1.05, 0.285, 0);
chuckGroup.add(pad2);

// Dielectric layer (thin disc on top)
const dielectricGroup = new THREE.Group();
dielectricGroup.position.y = 0.3;
chuckGroup.add(dielectricGroup);
const dielectricDisc = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.35, 0.04, 64), matDielectricJR);
dielectricGroup.add(dielectricDisc);

// Lift pins (3 pins, retracted in chuck)
const pinsGroup = new THREE.Group();
chuckGroup.add(pinsGroup);
const pinPositions = [
  [0.7, 0], [-0.35, 0.606], [-0.35, -0.606]
];
const pinMeshes = [];
pinPositions.forEach(([px, pz]) => {
  const pin = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.0, 16), matLiftPin);
  pin.position.set(px, 0.55, pz);
  pin.castShadow = true;
  pinsGroup.add(pin);
  pinMeshes.push(pin);
});

// ── Wafer ──
const waferGroup = new THREE.Group();
waferGroup.position.y = 1.8;
scene.add(waferGroup);

const waferDisc = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.05, 80), matWafer);
waferDisc.castShadow = true;
waferGroup.add(waferDisc);

// Wafer notch
const notchGeom = new THREE.SphereGeometry(0.06, 16, 8);
const notchCut = new THREE.Mesh(notchGeom, matChuckBody);
notchCut.position.set(0, 0, 1.28);
waferGroup.add(notchCut);

// Wafer edge ring
const waferEdge = new THREE.Mesh(
  new THREE.TorusGeometry(1.29, 0.02, 16, 80),
  new THREE.MeshStandardMaterial({ color: '#8888aa', roughness: 0.3, metalness: 0.7 })
);
waferEdge.rotation.x = -Math.PI / 2;
waferEdge.position.y = 0.025;
waferGroup.add(waferEdge);

// ── Electric field visualization ──
const fieldGroup = new THREE.Group();
fieldGroup.visible = false;
chuckGroup.add(fieldGroup);

// Create field arcs between electrode rings and wafer bottom
const fieldLines = [];
const numFieldLines = 36;
for (let i = 0; i < numFieldLines; i++) {
  const angle = (i / numFieldLines) * Math.PI * 2;
  const r = 0.9 + Math.random() * 0.3;
  const isOuter = i % 3 !== 2;

  const group = new THREE.Group();

  // Vertical beam segments
  const segCount = 3 + Math.floor(Math.random() * 3);
  for (let j = 0; j < segCount; j++) {
    const h = 0.06 + Math.random() * 0.1;
    const seg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, h, 8),
      new THREE.MeshBasicMaterial({ color: '#00d4ff', transparent: true, opacity: 0.6 })
    );
    seg.position.y = 0.32 + j * 0.25;
    group.add(seg);
  }

  group.position.set(Math.cos(angle) * r, 0, Math.sin(angle) * r);
  fieldGroup.add(group);
  fieldLines.push(group);
}

// Glow ring around electrodes
const glowRing = new THREE.Mesh(
  new THREE.TorusGeometry(1.15, 0.03, 16, 80),
  new THREE.MeshBasicMaterial({ color: '#00e8ff', transparent: true, opacity: 0.5 })
);
glowRing.rotation.x = -Math.PI / 2;
glowRing.position.y = 0.33;
fieldGroup.add(glowRing);

const glowInner = new THREE.Mesh(
  new THREE.TorusGeometry(0.6, 0.025, 16, 48),
  new THREE.MeshBasicMaterial({ color: '#00e8ff', transparent: true, opacity: 0.4 })
);
glowInner.rotation.x = -Math.PI / 2;
glowInner.position.y = 0.33;
fieldGroup.add(glowInner);

// ── Plasma particles ──
const particlesGroup = new THREE.Group();
fieldGroup.add(particlesGroup);
const particleGeom = new THREE.SphereGeometry(0.025, 8, 8);
const particles = [];
for (let i = 0; i < 60; i++) {
  const p = new THREE.Mesh(particleGeom, matSpark);
  p.position.set(
    (Math.random() - 0.5) * 2.5,
    0.3 + Math.random() * 0.6,
    (Math.random() - 0.5) * 2.5
  );
  p.userData = {
    baseX: p.position.x,
    baseZ: p.position.z,
    speed: 0.5 + Math.random() * 1.5,
    phase: Math.random() * Math.PI * 2,
    amplitude: 0.02 + Math.random() * 0.06
  };
  particlesGroup.add(p);
  particles.push(p);
}

// ── Dechuck voltage lines ──
const dechuckGroup = new THREE.Group();
dechuckGroup.visible = false;
chuckGroup.add(dechuckGroup);
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const line = new THREE.Mesh(
    new THREE.CylinderGeometry(0.008, 0.008, 0.4, 6),
    new THREE.MeshBasicMaterial({ color: '#ff4470', transparent: true, opacity: 0.7 })
  );
  line.position.set(Math.cos(angle) * 0.7, 0.5, Math.sin(angle) * 0.7);
  dechuckGroup.add(line);
}

// ── Step data ──
const steps = [
  {
    title: '晶圆接近',
    desc: '机械臂将硅晶圆送至静电吸盘上方，Lift Pin 从 chuck 内部升起接住晶圆，再缓缓下降使晶圆接近吸盘表面。',
    action: 'approach'
  },
  {
    title: '静电吸附 — 电极通电',
    desc: '电极施加 DC 电压（±500V~±2kV），在电极与晶圆之间产生强电场。J-R 型吸盘利用体电阻微泄漏电流实现比 Coulomb 型更强的吸附力。',
    action: 'clamp'
  },
  {
    title: '晶圆夹持 — 工艺加工',
    desc: '晶圆被牢牢固定在吸盘表面。背面 He 冷却气体通过吸盘内的微通道导入，使晶圆在刻蚀/PVD 过程中保持恒温。吸附力可达数千牛顿。',
    action: 'hold'
  },
  {
    title: 'Dechuck — 反向电压释放',
    desc: '工艺完成后，施加反向电压中和残余电荷。J-R 型需更长的 dechuck 时间因体电阻电荷释放较慢。部分设计使用 lift pin + 吹气辅助分离。',
    action: 'dechuck'
  },
  {
    title: '晶圆取出',
    desc: 'Lift Pin 再次升起将晶圆托离吸盘表面，机械臂取走晶圆送入下一道工序。一个完整的 clamp/dechuck 循环结束。',
    action: 'complete'
  }
];

let currentStep = 0;
let isAutoPlaying = false;
let autoTimer = null;
let escType = 'jr'; // 'jr' | 'coulomb'
let animationProgress = 0;
let animTarget = 0;

// ── Build step dots ──
steps.forEach((_, i) => {
  const dot = document.createElement('div');
  dot.className = 'step-dot' + (i === 0 ? ' active' : '');
  dot.title = `步骤 ${i + 1}: ${steps[i].title}`;
  dot.addEventListener('click', () => goToStep(i));
  stepsContainer.appendChild(dot);
});

// ── Step navigation ──
window.goToStep = function(i) {
  currentStep = Math.max(0, Math.min(steps.length - 1, i));
  updateStep();
};
window.nextStep = function() { goToStep(currentStep + 1); };
window.prevStep = function() { goToStep(currentStep - 1); };
window.toggleAuto = function() {
  isAutoPlaying = !isAutoPlaying;
  playBtn.textContent = isAutoPlaying ? '⏸' : '▶';
  if (isAutoPlaying) {
    if (currentStep >= steps.length - 1) goToStep(0);
    scheduleNext();
  } else {
    clearTimeout(autoTimer);
  }
};

function scheduleNext() {
  clearTimeout(autoTimer);
  if (!isAutoPlaying) return;
  autoTimer = setTimeout(() => {
    if (currentStep < steps.length - 1) { goToStep(currentStep + 1); scheduleNext(); }
    else { isAutoPlaying = false; playBtn.textContent = '▶'; }
  }, 4200);
}

function updateStep() {
  const step = steps[currentStep];
  narration.innerHTML = `
    <div class="narration-step">STEP ${currentStep + 1} / ${steps.length}</div>
    <div class="narration-title">${step.title}</div>
    <div class="narration-desc">${step.desc}</div>
  `;
  animTarget = currentStep;

  // Update dots
  Array.from(stepsContainer.children).forEach((dot, i) => {
    dot.classList.toggle('active', i === currentStep);
  });
}

// ── Type toggle ──
window.setType = function(type) {
  escType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(type === 'jr' ? 'J-R' : 'Coulomb')));
  typeLabel.textContent = type === 'jr' ? 'J-R 型' : 'Coulomb 型';

  // Update dielectric appearance
  dielectricDisc.material = type === 'jr' ? matDielectricJR : matDielectric;
  dielectricDisc.material.needsUpdate = true;

  // Update narration for step 1
  if (currentStep === 1) {
    const desc = type === 'jr'
      ? '电极施加 DC 电压。J-R 型吸盘的介质层具有微导电性（体电阻 ~10⁹–10¹¹ Ω·cm），微小泄漏电流流过晶圆-介质界面，产生比 Coulomb 型更强的 Johnsen-Rahbek 吸附力。'
      : '电极施加 DC 电压。Coulomb 型吸盘使用高绝缘介质层，电荷通过极化方式累积在介质表面，形成电容式静电力将晶圆吸附。无直流漏电流。';
    narration.querySelector('.narration-desc').textContent = desc;
  }
};

// ── Animation loop ──
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1);
  const t = performance.now() * 0.001;

  controls.update();

  // Smooth animation progress
  animationProgress += (animTarget - animationProgress) * Math.min(dt * 3, 1);

  // ── Wafer position based on step ──
  let waferY = 1.8;
  let waferScale = 1;
  let fieldOpacity = 0;
  let pinY = 0.55; // pin top offset

  if (animationProgress < 0.5) {
    // Step 0 → 1: wafer approaching
    const p = animationProgress / 0.5;
    waferY = 1.8 - p * 1.2; // 1.8 → 0.6
    pinY = 0.55 + p * 0.3; // pins slightly up if transitioning from approach
  } else if (animationProgress < 1.5) {
    // Step 1: wafer clamped
    waferY = 0.38; // sitting on dielectric (0.3 + 0.04 + 0.025)
    fieldOpacity = 1;
    pinY = 0.55; // pins retracted during clamping
  } else if (animationProgress < 2.5) {
    // Step 2: hold
    waferY = 0.38;
    fieldOpacity = Math.max(0, 1 - (animationProgress - 2.0) * 2);
    pinY = 0.55;
  } else if (animationProgress < 3.5) {
    // Step 3: dechuck
    const p = (animationProgress - 2.5);
    waferY = 0.38 + p * 0.6;
    fieldOpacity = Math.max(0, 1 - p * 2);
    pinY = 0.55 + p * 0.8;
  } else {
    // Step 4: complete — wafer lifted away
    waferY = 0.98 + (animationProgress - 3.5) * 0.8;
    fieldOpacity = 0;
    pinY = 1.0;
  }

  waferGroup.position.y = THREE.MathUtils.lerp(waferGroup.position.y, waferY, dt * 4);

  // ── Update pins ──
  const targetPinScale = animationProgress > 2.5 ? 1.6 : 1.0;
  pinMeshes.forEach(p => {
    p.scale.y += (targetPinScale - p.scale.y) * dt * 3;
    p.position.y = 0.55 * p.scale.y;
  });

  // ── Field visibility ──
  const targetFieldVis = fieldOpacity > 0.3;
  fieldGroup.visible = fieldOpacity > 0.2;

  // Animate field line opacity
  const fieldAlpha = Math.max(0, fieldOpacity);
  fieldLines.forEach((g, i) => {
    g.children.forEach(c => {
      c.material.opacity = fieldAlpha * (0.3 + 0.3 * Math.sin(t * 8 + i));
    });
  });
  glowRing.material.opacity = fieldAlpha * 0.5;
  glowInner.material.opacity = fieldAlpha * 0.4;

  // ── Animate plasma particles ──
  if (fieldOpacity > 0.1) {
    particlesGroup.visible = true;
    particles.forEach(p => {
      const ud = p.userData;
      p.position.y = 0.32 + Math.sin(t * ud.speed + ud.phase) * ud.amplitude;
      p.position.x = ud.baseX + Math.cos(t * ud.speed * 0.7 + ud.phase) * 0.05;
      p.position.z = ud.baseZ + Math.sin(t * ud.speed * 0.6 + ud.phase) * 0.05;
      p.material.opacity = fieldAlpha * (0.4 + 0.4 * Math.sin(t * ud.speed + ud.phase));
    });
  } else {
    particlesGroup.visible = false;
  }

  // ── Dechuck lines ──
  const dechuckPhase = Math.max(0, (animationProgress - 2.5) / 1.0);
  dechuckGroup.visible = dechuckPhase > 0.1 && dechuckPhase < 0.9;
  if (dechuckGroup.visible) {
    dechuckGroup.children.forEach((line, i) => {
      line.material.opacity = dechuckPhase * 0.6 * (0.5 + 0.5 * Math.sin(t * 10 + i));
    });
    dechuckGroup.rotation.y += dt * 0.8;
  }

  // ── Wafer subtle rotation ──
  if (animationProgress < 2.5) {
    waferGroup.rotation.y += dt * 0.1;
  }

  // ── Electrode emissive pulse ──
  const emissiveTarget = fieldOpacity > 0.5 ? 0.6 : 0.3;
  matElectrode.emissiveIntensity += (emissiveTarget - matElectrode.emissiveIntensity) * dt * 2;

  renderer.render(scene, camera);
}

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Keyboard shortcuts ──
window.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowRight': case ' ': e.preventDefault(); nextStep(); break;
    case 'ArrowLeft': e.preventDefault(); prevStep(); break;
    case 'a': toggleAuto(); break;
    case '1': goToStep(0); break;
    case '2': goToStep(1); break;
    case '3': goToStep(2); break;
    case '4': goToStep(3); break;
    case '5': goToStep(4); break;
  }
});

// ── Start ──
updateStep();
animate();
